services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: namedrop
      POSTGRES_USER: namedrop
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  server:
    build: ./server
    environment:
      DATABASE_URL: postgres://namedrop:${DB_PASSWORD}@db:5432/namedrop
    volumes:
      - photos:/app/uploads/photos
    ports:
      - "3001:3001"
    depends_on:
      - db

  # client:
  #   build: ./client
  #   environment:
  #     API_URL: http://server:3001
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - server

volumes:
  pg_data:
  photos:
